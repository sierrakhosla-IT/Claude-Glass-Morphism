<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execution Tower</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Instrument+Sans:wght@400;500;560;600;650&display=swap');

:root{
  --canvas:#F6F4EF;
  --canvas-2:#FBFAF6;
  --ink:#28251F;
  --ink-soft:#726B60;
  --ink-faint:#A39A8C;
  --white:#FFFFFF;

  --accent:#7C82C9;        /* muted periwinkle — brand primary, locked */
  --accent-soft:#AEB4E6;
  --accent-pressed:#6269AE;
  --accent-tint:#EEF0FC;

  --success:#77906F;
  --success-tint:#F0F2EC;
  --warning:#B08C57;
  --warning-tint:#FAF2E6;
  --danger:#B87270;
  --danger-tint:#FAEDEC;
  --waiting:#8B8478;
  --waiting-tint:#F1EFEA;

  --glass-fill:rgba(255,253,249,0.72);
  --glass-fill-strong:rgba(255,254,251,0.88);
  --glass-fill-utility:rgba(255,252,247,0.58);
  --glass-border:rgba(40,37,31,0.09);
  --glass-blur:16px;

  --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px; --r-pill:999px;

  /* single elevation recipe, reused everywhere — no per-surface shadow stacking */
  --elevation: 0 1px 2px rgba(40,37,31,0.05), 0 12px 28px -6px rgba(90,80,70,0.12);
  --elevation-inset: inset 0 1px 0 rgba(255,255,255,0.55);

  --font-body:'Instrument Sans', system-ui, sans-serif;
  --font-display:'Outfit', 'Instrument Sans', system-ui, sans-serif;

  --ease:cubic-bezier(.4,0,.2,1);
  --dur:180ms;
}

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:var(--font-body);
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  background:var(--canvas);
}
button{ font-family:inherit; cursor:pointer; }
input, textarea{ font-family:inherit; }
.count, .panel-count, .low-count, .cnt, [id^="cnt"], [id^="nav"][id$="Count"]{ font-variant-numeric:tabular-nums; }

::-webkit-scrollbar{ width:7px; height:7px; }
::-webkit-scrollbar-thumb{ background:rgba(124,130,201,0.20); border-radius:99px; }
::-webkit-scrollbar-track{ background:transparent; }

/* ---------------- Glass primitive — one fill, one border, one elevation ---------------- */
.glass{
  background:var(--glass-fill);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl);
  backdrop-filter:blur(var(--glass-blur)) saturate(108%);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(108%);
  box-shadow:var(--elevation-inset), var(--elevation);
}

/* ---------------- App shell ---------------- */
.app{
  display:grid;
  grid-template-columns:224px 1fr;
  height:100vh;
  padding:20px;
  gap:20px;
}

/* ---------------- Sidebar ---------------- */
.sidebar{
  display:flex; flex-direction:column; gap:24px;
  padding:26px 18px;
  background:rgba(250,248,244,0.8);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl);
  backdrop-filter:blur(20px) saturate(108%);
  box-shadow:var(--elevation-inset), var(--elevation);
  color:var(--ink);
}
.brand{ display:flex; align-items:center; gap:10px; padding:0 4px; }
.brand-mark{ width:26px; height:26px; border-radius:9px; background:linear-gradient(150deg, var(--accent-soft), var(--accent)); flex-shrink:0; }
.brand-text{ font-family:var(--font-display); font-size:14px; font-weight:700; letter-spacing:0.05em; line-height:1.15; color:var(--ink); }
.brand-text small{ display:block; font-size:9px; font-weight:600; opacity:0.5; letter-spacing:0.16em; color:var(--ink-soft); margin-top:1px; }

.nav{ display:flex; flex-direction:column; gap:4px; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:12px;
  font-size:12.5px; font-weight:540; color:var(--ink-soft);
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.nav-item svg{ width:15px; height:15px; stroke-width:1.4; flex-shrink:0; }
.nav-item span.label{ flex:1; letter-spacing:0.01em; }
.nav-item .count{
  font-size:10px; font-weight:650; min-width:19px; height:19px;
  display:flex; align-items:center; justify-content:center;
  border-radius:99px; background:rgba(40,37,31,0.06); color:var(--ink-soft);
}
.nav-item:hover{ background:var(--accent-tint); color:var(--ink); }
.nav-item.active{ background:var(--accent-tint); color:var(--accent-pressed); }
.nav-item.active .count{ background:rgba(124,130,201,0.16); color:var(--accent-pressed); }
.nav-item.urgent .count{ background:var(--danger); color:#fff; }

.nav-divider{ height:1px; background:rgba(40,37,31,0.08); margin:4px 4px; }
.sidebar-foot{ margin-top:auto; font-size:10px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-faint); padding:0 4px; }

/* ---------------- Main column ---------------- */
.main{ display:flex; flex-direction:column; gap:16px; min-height:0; min-width:0; }

/* Command bar */
.cmdbar{
  display:flex; align-items:center; gap:12px;
  padding:11px 12px 11px 20px;
  border-radius:var(--r-pill) !important;
}
.cmdbar input{
  flex:1; border:none; outline:none; background:transparent;
  font-size:13.5px; color:var(--ink); font-weight:500;
}
.cmdbar input::placeholder{ color:var(--ink-faint); }
.cmdbar .icon-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center;
  color:var(--ink-soft); transition:background var(--dur) var(--ease);
}
.cmdbar .icon-btn:hover{ background:rgba(255,255,255,0.85); }
.cmdbar .icon-btn svg{ width:16px; height:16px; stroke-width:1.4; }

.pill-btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 18px; border-radius:var(--r-pill); border:1px solid rgba(40,37,31,0.08);
  background:rgba(255,255,255,0.5); color:var(--ink-soft); font-size:12.5px; font-weight:600;
  transition:transform var(--dur) var(--ease), background var(--dur) var(--ease);
}
.pill-btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,0.85); }
.pill-btn.primary{
  background:var(--accent);
  color:#fff; border:none;
}
.pill-btn svg{ width:14px; height:14px; stroke-width:1.6; }

/* Health pills — status signal, color earned by state */
.health-row{ display:flex; align-items:center; gap:7px; }
.health-pill{
  display:flex; align-items:center; gap:6px;
  padding:5px 11px 5px 8px; border-radius:var(--r-pill);
  font-size:10.5px; font-weight:650; letter-spacing:0.02em; color:var(--ink-soft);
  background:rgba(255,255,255,0.5); border:1px solid rgba(40,37,31,0.06);
}
.health-pill .dot{ width:6px; height:6px; border-radius:50%; }
.health-pill.attn .dot{ background:var(--accent); }
.health-pill.wait .dot{ background:#8B8478; }
.health-pill.block .dot{ background:var(--warning); }
.health-pill.over .dot{ background:var(--danger); }
.health-pill.over{ color:var(--danger); background:var(--danger-tint); border-color:transparent; }

/* Executive Tower strip */
.exec-strip{
  padding:20px 26px;
  transition:padding var(--dur) var(--ease), max-height var(--dur) var(--ease);
}
.exec-strip-head{ display:flex; align-items:center; gap:9px; cursor:pointer; user-select:none; }
.exec-strip-head svg.chev{ width:13px; height:13px; stroke-width:1.6; color:var(--ink-faint); transition:transform var(--dur) var(--ease); margin-left:auto; }
.exec-strip.collapsed .chev{ transform:rotate(-90deg); }
.exec-title{ font-family:var(--font-display); font-size:13px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent-pressed); }
.exec-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:24px;
  margin-top:18px;
  max-height:120px; overflow:hidden; opacity:1;
  transition:max-height var(--dur) var(--ease), opacity var(--dur) var(--ease), margin var(--dur) var(--ease);
}
.exec-strip.collapsed .exec-grid{ max-height:0; opacity:0; margin-top:0; }
.exec-field{ min-width:0; }
.exec-field label{ display:block; font-size:9.5px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:7px; }
.exec-editable{
  display:block; width:100%; border:none; background:transparent;
  font-size:13px; font-weight:540; color:var(--ink); line-height:1.4;
  min-height:18px; outline:none; border-radius:8px; padding:3px 5px; margin:-3px -5px;
}
.exec-editable::placeholder{ color:var(--ink-faint); font-weight:480; }
.exec-editable:hover{ background:rgba(255,255,255,0.4); }
.exec-editable:focus{ background:rgba(255,255,255,0.7); box-shadow:0 0 0 2px rgba(124,130,201,0.25); }
.leader-row{ display:flex; align-items:baseline; gap:6px; font-size:13px; }
.leader-row + .leader-row{ margin-top:5px; }
.leader-name{ font-weight:650; color:var(--ink-soft); flex-shrink:0; }

/* Triage grid */
.triage{
  display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:16px;
  flex:1; min-height:0;
}
.panel{ display:flex; flex-direction:column; min-height:0; padding:0; }
.panel-head{
  display:flex; align-items:center; gap:10px;
  padding:20px 24px 14px;
  flex-shrink:0;
}
.panel-head svg.pi{ width:16px; height:16px; stroke-width:1.4; }
.panel-title{ font-family:var(--font-display); font-size:15.5px; font-weight:700; letter-spacing:0.01em; color:var(--ink); }
.panel-sub{ font-size:10.5px; letter-spacing:0.03em; color:var(--ink-faint); font-weight:520; margin-top:2px; }
.panel-count{
  min-width:22px; height:22px; padding:0 6px; border-radius:99px;
  display:flex; align-items:center; justify-content:center;
  font-size:10.5px; font-weight:700; color:var(--ink-soft); background:rgba(255,255,255,0.5);
}
.panel-body{ flex:1; overflow-y:auto; padding:4px 18px 20px; }
.panel-empty{ font-size:11.5px; color:var(--ink-faint); padding:24px 8px; text-align:center; }

/* Attention panel: hero */
.attn-add{
  display:flex; align-items:center; gap:9px; margin:0 4px 14px;
  padding:11px 14px; border-radius:var(--r-md);
  background:rgba(255,255,255,0.4); border:1px dashed rgba(124,130,201,0.32);
}
.attn-add svg{ width:14px; height:14px; color:var(--accent); stroke-width:1.6; flex-shrink:0; }
.attn-add input{ flex:1; border:none; background:transparent; outline:none; font-size:12.5px; color:var(--ink); font-weight:500; }
.attn-add input::placeholder{ color:var(--ink-faint); }

/* Task row (Attention Now) */
.task{ border-bottom:1px solid rgba(40,37,31,0.06); }
.task:last-child{ border-bottom:none; }
.task-row{ display:flex; align-items:flex-start; gap:12px; padding:14px 8px; border-radius:var(--r-md); transition:background var(--dur) var(--ease); cursor:pointer; }
.task-row:hover{ background:var(--accent-tint); }
.check{
  width:17px; height:17px; border-radius:50%; margin-top:1px; flex-shrink:0;
  border:1.5px solid var(--ink-faint); background:rgba(255,255,255,0.5);
  transition:background var(--dur), border-color var(--dur);
}
.check:hover{ border-color:var(--accent); }
.check.done{ background:var(--success); border-color:var(--success); }
.task-main{ flex:1; min-width:0; }
.task-title-row{ display:flex; align-items:center; gap:7px; }
.task-title{ display:block; width:100%; border:none; background:transparent; font-size:13px; font-weight:560; color:var(--ink); outline:none; border-radius:5px; padding:1px 3px; margin:-1px -3px; }
.task-title:focus{ background:rgba(255,255,255,0.7); }
.task-next{ display:block; width:100%; border:none; background:transparent; font-size:11.5px; color:var(--ink-soft); margin-top:4px; outline:none; border-radius:5px; padding:1px 3px; margin-left:-3px; }
.task-next::placeholder{ color:var(--ink-faint); }
.task-next:focus{ background:rgba(255,255,255,0.6); }
.task-meta{ display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }

/* Metadata reads as tracked uppercase micro-labels — quiet, informational, not operational state */
.chip{
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:650; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--ink-faint);
  padding:0; background:transparent; border-radius:0;
  outline:none;
}
.chip:empty::before{ color:var(--ink-faint); font-weight:520; }
.chip.ticket{ color:var(--ink-soft); }
.chip.due{ color:var(--ink-soft); }
/* overdue is operational state — earns color and a real chip surface */
.chip.due.overdue{ background:var(--danger); color:#fff; padding:3px 9px; border-radius:99px; letter-spacing:0.02em; }
/* priority is operational state — earns color */
.chip.priority-high{ background:var(--danger-tint); color:var(--danger); padding:3px 9px; border-radius:99px; letter-spacing:0.02em; text-transform:none; font-weight:600; }
.chip.priority-med{ background:var(--warning-tint); color:var(--warning); padding:3px 9px; border-radius:99px; letter-spacing:0.02em; text-transform:none; font-weight:600; }
.chip.priority-low{ background:rgba(255,255,255,0.5); color:var(--ink-faint); padding:3px 9px; border-radius:99px; letter-spacing:0.02em; text-transform:none; font-weight:600; }
.chip-add{ font-size:10px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-faint); font-weight:650; cursor:pointer; padding:3px 2px; }
.chip-add:hover{ color:var(--accent); }
.expand-toggle{ margin-left:auto; color:var(--ink-faint); flex-shrink:0; display:flex; align-items:center; gap:2px; }
.expand-toggle svg{ width:13px; height:13px; stroke-width:1.6; transition:transform var(--dur) var(--ease); }
.task.expanded .expand-toggle svg.chev{ transform:rotate(180deg); }
.task-delete{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-faint); opacity:0; transition:opacity var(--dur) var(--ease), background var(--dur) var(--ease), color var(--dur) var(--ease); }
.task-row:hover .task-delete{ opacity:1; }
.task-delete:hover{ background:var(--danger-tint); color:var(--danger); }
.task-delete svg{ width:13px; height:13px; stroke-width:1.6; }

.drag-handle{ width:18px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:var(--ink-faint); opacity:0; transition:opacity var(--dur) var(--ease), background var(--dur) var(--ease), color var(--dur) var(--ease); cursor:grab; flex-shrink:0; touch-action:none; }
.task-row:hover .drag-handle{ opacity:0.55; }
.drag-handle:hover{ opacity:1 !important; background:var(--accent-tint); color:var(--accent-pressed); }
.drag-handle:active{ cursor:grabbing; }
.drag-handle svg{ width:13px; height:13px; stroke-width:1.6; pointer-events:none; }

.task, .low-item, .wait-item, .block-item{ transition:opacity var(--dur) var(--ease); }
.task.dragging, .low-item.dragging, .wait-item.dragging, .block-item.dragging{ opacity:0.35; }
.task.drop-before, .low-item.drop-before, .wait-item.drop-before, .block-item.drop-before{ box-shadow:inset 0 2px 0 0 var(--accent); }
.task.drop-after, .low-item.drop-after, .wait-item.drop-after, .block-item.drop-after{ box-shadow:inset 0 -2px 0 0 var(--accent); }
.panel-body.drag-active{ background:var(--accent-tint); border-radius:var(--r-md); }
.low-body-inner.drag-active{ background:var(--accent-tint); border-radius:var(--r-md); }

.task-detail{ max-height:0; overflow:hidden; transition:max-height var(--dur) var(--ease); padding:0 8px; }
.task.expanded .task-detail{ max-height:320px; }
.detail-inner{ padding:6px 34px 16px 33px; display:flex; flex-direction:column; gap:12px; }
.detail-field{ display:flex; flex-direction:column; gap:4px; }
.detail-field label{ font-size:9.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); }
.detail-field .val{ display:block; width:100%; border:none; font-family:inherit; font-size:12.5px; color:var(--ink); outline:none; border-radius:6px; padding:4px 6px; margin:-4px -6px; background:rgba(255,255,255,0.35); resize:none; }
.detail-field .val::placeholder{ color:var(--ink-faint); }
.detail-field .val:focus{ background:rgba(255,255,255,0.7); }
.detail-row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.status-row{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-top:2px; }
.status-btn{
  font-size:10px; font-weight:650; letter-spacing:0.03em; padding:6px 12px; border-radius:99px;
  background:rgba(255,255,255,0.5); color:var(--ink-soft); border:1px solid transparent;
}
.status-btn.current{ background:var(--accent); color:#fff; }
.delete-row{ margin-top:4px; padding-top:12px; border-top:1px solid rgba(40,37,31,0.06); }
.delete-task-btn{ display:inline-flex; align-items:center; gap:6px; font-size:10.5px; font-weight:650; letter-spacing:0.02em; color:var(--danger); cursor:pointer; padding:5px 4px; }
.delete-task-btn svg{ width:12px; height:12px; stroke-width:1.6; }
.delete-task-btn:hover{ text-decoration:underline; }
.subtask-list{ display:flex; flex-direction:column; gap:6px; }
.subtask-row{ display:flex; align-items:center; gap:8px; font-size:11.5px; }
.subtask-row .check{ width:13px; height:13px; }
.subtask-row .val{ flex:1; }
.subtask-row .done + .val{ color:var(--ink-faint); text-decoration:line-through; }
.subtask-add{ font-size:10px; font-weight:650; letter-spacing:0.03em; text-transform:uppercase; color:var(--ink-faint); cursor:pointer; padding:4px 2px; }
.subtask-add:hover{ color:var(--accent); }

/* Waiting panel groups */
.wait-group{ margin-bottom:14px; }
.wait-group:last-child{ margin-bottom:0; }
.wait-group-head{ display:flex; align-items:center; gap:9px; padding:6px 4px 8px; }
.wait-avatar{ width:24px; height:24px; border-radius:50%; background:var(--accent-tint); color:var(--accent-pressed); font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.wait-name{ font-size:11.5px; font-weight:650; color:var(--ink-soft); flex:1; }
.wait-count{ font-size:10px; font-weight:650; color:var(--ink-faint); }
.wait-item{ padding:9px 6px; border-bottom:1px solid rgba(40,37,31,0.05); }
.wait-item:last-child{ border-bottom:none; }
.wait-item .task-title{ display:block; font-size:12.5px; font-weight:550; }
.wait-item .task-meta{ margin-top:6px; }

/* Blocked panel */
.block-item{ padding:11px 6px 11px 28px; border-bottom:1px solid rgba(40,37,31,0.05); position:relative; }
.block-item:hover .drag-handle{ opacity:0.55; }
.block-item .drag-handle{ position:absolute; left:2px; top:10px; }
.block-item:last-child{ border-bottom:none; }
.block-item .task-title{ display:block; font-size:12.5px; font-weight:550; }
.block-item .task-meta{ margin-top:6px; }

/* Bottom low-weight strip */
.low-strip{ display:flex; gap:16px; flex-shrink:0; }
.low-panel{ flex:1; padding:0; overflow:hidden; }
.low-panel.glass{
  border-radius:var(--r-lg);
  background:var(--glass-fill-utility);
}
.low-head{
  display:flex; align-items:center; gap:9px; padding:13px 20px; cursor:pointer; user-select:none;
  transition:background var(--dur) var(--ease);
}
.low-head:hover{ background:rgba(255,255,255,0.35); }
.low-head svg.li{ width:14px; height:14px; stroke-width:1.4; color:var(--ink-faint); }
.low-title{ font-family:var(--font-display); font-size:12.5px; font-weight:700; letter-spacing:0.01em; color:var(--ink-soft); }
.low-count{ font-size:10.5px; font-weight:650; color:var(--ink-faint); }
.low-head svg.chev{ width:12px; height:12px; stroke-width:1.6; color:var(--ink-faint); margin-left:auto; transition:transform var(--dur) var(--ease); }
.low-panel.open .chev{ transform:rotate(180deg); }
.low-body{ max-height:0; overflow:hidden; transition:max-height var(--dur) var(--ease); }
.low-panel.open .low-body{ max-height:180px; overflow-y:auto; }
.low-body-inner{ padding:0 18px 16px; }
.low-item{ display:flex; align-items:center; gap:9px; padding:7px 4px; font-size:11.5px; color:var(--ink-soft); border-bottom:1px solid rgba(40,37,31,0.04); position:relative; }
.low-item:hover .drag-handle{ opacity:0.55; }
.low-item:last-child{ border-bottom:none; }
.low-item.completed{ color:var(--ink-faint); }
.low-item.completed .check{ width:12px; height:12px; background:var(--success); border-color:var(--success); }
.low-item .task-title{ font-size:11.5px; flex:1; }

@media (max-width:1180px){
  .triage{ grid-template-columns:1.3fr 1fr; }
  .triage .panel:nth-child(3){ grid-column:1 / -1; }
}

</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">EXECUTION<small>TOWER</small></div>

<script>
/* ============================================================
   INLINE ICON SET — self-contained replacement for the lucide
   CDN script. Same API (lucide.createIcons()), zero network
   dependency, so this never breaks in a sandboxed preview,
   offline, or behind a corporate proxy.
   ============================================================ */
const ICONS = {
  'plus': '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
  'chevron-down': '<polyline points="6 9 12 15 18 9"></polyline>',
  'chevron-left': '<polyline points="15 18 9 12 15 6"></polyline>',
  'check-check': '<path d="M18 6 7 17l-5-5"></path><path d="m22 10-7.5 7.5L13 16"></path>',
  'sparkles': '<path d="M12 3v4M12 17v4M5 12H1M23 12h-4M6.34 6.34 3.5 3.5M20.5 20.5l-2.84-2.84M6.34 17.66 3.5 20.5M20.5 3.5l-2.84 2.84"></path><circle cx="12" cy="12" r="3"></circle>',
  'x': '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
  'zap': '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
  'users': '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>',
  'octagon-pause': '<path d="M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86Z"></path><line x1="10" y1="15" x2="10" y2="9"></line><line x1="14" y1="15" x2="14" y2="9"></line>',
  'layers': '<path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"></path><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"></path><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"></path>',
  'compass': '<circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>',
  'corner-down-right': '<polyline points="15 10 20 15 15 20"></polyline><path d="M4 4v7a4 4 0 0 0 4 4h12"></path>',
  'search': '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
  'trash-2': '<path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>',
  'grip-vertical': '<circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="19" r="1"></circle>',
  'download': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>',
  'upload': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>'
};

const lucide = {
  createIcons(){
    document.querySelectorAll('[data-lucide]').forEach(el=>{
      const name = el.getAttribute('data-lucide');
      const inner = ICONS[name];
      if(!inner) return;
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 24 24');
      svg.setAttribute('width','20');
      svg.setAttribute('height','20');
      svg.setAttribute('fill','none');
      svg.setAttribute('stroke','currentColor');
      svg.setAttribute('stroke-width','1.5');
      svg.setAttribute('stroke-linecap','round');
      svg.setAttribute('stroke-linejoin','round');
      for(const attr of el.attributes){
        if(attr.name === 'data-lucide') continue;
        svg.setAttribute(attr.name, attr.value);
      }
      svg.innerHTML = inner;
      el.replaceWith(svg);
    });
  }
};
</script>
<script>
/* ---------- Icon rendering (svg data-i -> lucide) ---------- */
function paintIcons(){
  document.querySelectorAll('svg[data-i]').forEach(el=>{
    const name = el.getAttribute('data-i');
    el.removeAttribute('data-i');
    el.setAttribute('data-lucide', name);
  });
  lucide.createIcons();
}

/* ---------- Data model ----------
   Single Task Queue. status: 'today' | 'queue' | 'waiting' | 'onhold' | 'completed'
   Ported from the real backup — nothing fabricated. */
let tasks = [
  { id:'z706q2z', title:'Validate Carrier and Device Inventory Exceptions', ticket:'', due:'', nextAction:'', status:'today', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'bhv4zv0', title:'Add User email to the inventory intake process form', ticket:'', due:'', nextAction:'', status:'queue', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'rspopck', title:'Gather thoughts and questions about new plan', ticket:'', due:'7/21/2026', nextAction:'', status:'waiting', priority:'',
    waitingOn:'Tavia — her ideas and the migration',
    context:'Instead of thinking about a line migration & device refresh, treat them as two separate projects.',
    subs:[
      {id:'nw4ixem', t:'Brainstorm the plan for only line migration', done:false},
      {id:'wxut790', t:'Brainstorm the plan for only device refresh', done:false},
      {id:'3pksoeg', t:'Document complications', done:false},
      {id:'38lyfl6', t:'Document questions', done:false},
    ]},
  { id:'lvf9jxz', title:"Disconnect Brooke William's line", status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'0k9o3x6', title:'Disconnect Terry Oswalds line', status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'010z75q', title:"Inventory Pierre Brunelle's laptop", status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'j2uqafu', title:'Cleanup Intune Report', status:'completed', due:'', ticket:'', nextAction:'Pull updated report', priority:'', context:'', waitingOn:'', subs:[] },
];

let expandedId = null;

const el = id => document.getElementById(id);

function isOverdue(due){
  if(!due) return false;
  const d = new Date(due);
  if(isNaN(d)) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function priorityChip(p){
  if(!p) return '';
  const cls = p==='high'?'priority-high':p==='med'?'priority-med':'priority-low';
  return `<span class="chip ${cls}">${p==='high'?'High':p==='med'?'Medium':'Low'}</span>`;
}

/* ---------- Rendering ---------- */
function render(){
  const attention = tasks.filter(t=>t.status==='today' || (t.status==='queue' && t.due));
  const waiting = tasks.filter(t=>t.status==='waiting');
  const blocked = tasks.filter(t=>t.status==='onhold');
  const backlog = tasks.filter(t=>t.status==='queue' && !t.due);
  const done = tasks.filter(t=>t.status==='completed');

  el('cntAttention').textContent = attention.length;
  el('cntWaiting').textContent = waiting.length;
  el('cntBlocked').textContent = blocked.length;
  el('cntBacklog').textContent = backlog.length;
  el('cntDone').textContent = done.length;
  el('navAttnCount').textContent = attention.length;
  el('navWaitCount').textContent = waiting.length;
  el('navBlockCount').textContent = blocked.length;
  el('navBacklogCount').textContent = backlog.length;
  el('navDoneCount').textContent = done.length;

  const overdueCount = tasks.filter(t=>isOverdue(t.due) && t.status!=='completed').length;
  el('healthRow').innerHTML = `
    <div class="health-pill attn"><span class="dot"></span>${attention.length} Attention</div>
    <div class="health-pill wait"><span class="dot"></span>${waiting.length} Waiting</div>
    <div class="health-pill block"><span class="dot"></span>${blocked.length} Blocked</div>
    ${overdueCount ? `<div class="health-pill over"><span class="dot"></span>${overdueCount} Overdue</div>` : ''}
  `;

  el('listAttention').innerHTML = attention.length
    ? attention.map(t=>taskRowHTML(t)).join('')
    : `<div class="panel-empty">Nothing needs attention right now.</div>`;

  // Waiting — grouped by person, each item is the same full editable row as everywhere else
  const groups = {};
  waiting.forEach(t=>{
    const who = (t.waitingOn||'Unspecified').split('—')[0].split('-')[0].trim() || 'Unspecified';
    (groups[who] = groups[who]||[]).push(t);
  });
  el('listWaiting').innerHTML = waiting.length
    ? Object.entries(groups).map(([name, items])=>`
        <div class="wait-group">
          <div class="wait-group-head">
            <div class="wait-avatar">${name.slice(0,2).toUpperCase()}</div>
            <div class="wait-name">${name}</div>
            <div class="wait-count">${items.length}</div>
          </div>
          ${items.map(t=>taskRowHTML(t)).join('')}
        </div>`).join('')
    : `<div class="panel-empty">Nothing waiting on anyone.</div>`;

  el('listBlocked').innerHTML = blocked.length
    ? blocked.map(t=>taskRowHTML(t)).join('')
    : `<div class="panel-empty">Nothing blocked.</div>`;

  el('listBacklog').innerHTML = backlog.length
    ? backlog.map(t=>taskRowHTML(t)).join('')
    : `<div class="panel-empty">Backlog is empty.</div>`;

  el('listDone').innerHTML = done.length
    ? done.map(t=>taskRowHTML(t)).join('')
    : `<div class="panel-empty">Nothing completed yet.</div>`;

  paintIcons();
  wireRowEvents();
  wireDrag();
}

function taskRowHTML(t){
  const expanded = expandedId === t.id;
  return `
  <div class="task ${expanded?'expanded':''}" data-id="${t.id}">
    <div class="task-row" data-role="row">
      <div class="drag-handle" data-role="drag-handle" title="Drag to move or reorder"><svg data-i="grip-vertical"></svg></div>
      <div class="check ${t.status==='completed'?'done':''}" data-role="check"></div>
      <div class="task-main">
        <div class="task-title-row">
          <input class="task-title" data-role="title" value="${escAttr(t.title)}">
        </div>
        <input class="task-next" data-role="next" placeholder="+ next action" value="${escAttr(t.nextAction||'')}">
        <div class="task-meta">
          ${t.ticket?`<span class="chip ticket">${t.ticket}</span>`:''}
          ${t.due?`<span class="chip due ${isOverdue(t.due)?'overdue':''}">${t.due}</span>`:''}
          ${priorityChip(t.priority)}
          <span class="chip-add" data-role="add-priority">+ priority</span>
        </div>
      </div>
      <div class="task-delete" data-role="delete" title="Delete task"><svg data-i="trash-2"></svg></div>
      <div class="expand-toggle" data-role="toggle"><svg data-i="chevron-down" class="chev"></svg></div>
    </div>
    <div class="task-detail">
      <div class="detail-inner">
        <div class="detail-row2">
          <div class="detail-field"><label>Ticket</label><input class="val" placeholder="RITM / INC" data-role="ticket" value="${escAttr(t.ticket||'')}"></div>
          <div class="detail-field"><label>Due</label><input class="val" placeholder="mm/dd/yyyy" data-role="due" value="${escAttr(t.due||'')}"></div>
        </div>
        <div class="detail-field"><label>Context</label><textarea class="val" rows="2" placeholder="Add context or notes" data-role="context">${t.context||''}</textarea></div>
        <div class="subtask-list" data-role="subs">
          ${t.subs.map(s=>`
            <div class="subtask-row" data-sub="${s.id}">
              <div class="check ${s.done?'done':''}" data-role="sub-check"></div>
              <input class="val" data-role="sub-text" value="${escAttr(s.t)}">
            </div>`).join('')}
          <div class="subtask-add" data-role="add-sub">+ subtask</div>
        </div>
        <div class="status-row">
          ${['today','queue','waiting','onhold','completed'].map(s=>`
            <div class="status-btn ${t.status===s?'current':''}" data-role="status" data-status="${s}">${labelFor(s)}</div>`).join('')}
        </div>
        <div class="delete-row">
          <div class="delete-task-btn" data-role="delete-full"><svg data-i="trash-2"></svg>Delete task</div>
        </div>
      </div>
    </div>
  </div>`;
}
function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function labelFor(s){
  return {today:'Attention', queue:'Backlog', waiting:'Waiting', onhold:'Blocked', completed:'Done'}[s];
}

function wireRowEvents(){
  document.querySelectorAll('.task').forEach(taskEl=>{
    const id = taskEl.dataset.id;
    const t = tasks.find(x=>x.id===id);
    if(!t) return;

    taskEl.querySelector('[data-role="row"]').addEventListener('click', (e)=>{
      if(e.target.closest('[data-role="check"]') || e.target.closest('[data-role="delete"]') || ['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
      expandedId = expandedId === id ? null : id;
      render();
    });
    taskEl.querySelector('[data-role="check"]').addEventListener('click', (e)=>{
      e.stopPropagation();
      t.status = t.status === 'completed' ? 'today' : 'completed';
      render();
    });

    function deleteThis(){
      if(!confirm(`Delete "${t.title}"? This can't be undone.`)) return;
      tasks = tasks.filter(x=>x.id!==id);
      if(expandedId===id) expandedId = null;
      render();
    }
    taskEl.querySelector('[data-role="delete"]')?.addEventListener('click', e=>{ e.stopPropagation(); deleteThis(); });
    taskEl.querySelector('[data-role="delete-full"]')?.addEventListener('click', e=>{ e.stopPropagation(); deleteThis(); });

    const title = taskEl.querySelector('[data-role="title"]');
    title.addEventListener('blur', ()=>{ t.title = title.value.trim() || t.title; render(); });
    title.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); title.blur(); } });
    title.addEventListener('click', e=> e.stopPropagation());

    const next = taskEl.querySelector('[data-role="next"]');
    next.addEventListener('blur', ()=>{ t.nextAction = next.value.trim(); render(); });
    next.addEventListener('click', e=> e.stopPropagation());
    next.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); next.blur(); } });

    taskEl.querySelector('[data-role="add-priority"]')?.addEventListener('click', e=>{
      e.stopPropagation();
      const order = ['', 'low', 'med', 'high'];
      t.priority = order[(order.indexOf(t.priority)+1) % order.length];
      render();
    });

    const ticket = taskEl.querySelector('[data-role="ticket"]');
    ticket?.addEventListener('blur', ()=>{ t.ticket = ticket.value.trim(); render(); });
    ticket?.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); ticket.blur(); } });
    const due = taskEl.querySelector('[data-role="due"]');
    due?.addEventListener('blur', ()=>{ t.due = due.value.trim(); render(); });
    due?.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); due.blur(); } });
    const ctx = taskEl.querySelector('[data-role="context"]');
    ctx?.addEventListener('blur', ()=>{ t.context = ctx.value.trim(); render(); });

    taskEl.querySelectorAll('[data-role="status"]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        t.status = btn.dataset.status;
        expandedId = null;
        render();
      });
    });

    taskEl.querySelectorAll('.subtask-row').forEach(row=>{
      const subId = row.dataset.sub;
      const sub = t.subs.find(s=>s.id===subId);
      row.querySelector('[data-role="sub-check"]').addEventListener('click', e=>{
        e.stopPropagation(); sub.done = !sub.done; render();
      });
      const txt = row.querySelector('[data-role="sub-text"]');
      txt.addEventListener('blur', ()=>{ sub.t = txt.value.trim(); render(); });
      txt.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); txt.blur(); } });
    });
    taskEl.querySelector('[data-role="add-sub"]')?.addEventListener('click', e=>{
      e.stopPropagation();
      t.subs.push({id:'s'+Math.random().toString(36).slice(2,8), t:'', done:false});
      render();
      setTimeout(()=>{
        const rows = document.querySelectorAll(`.task[data-id="${id}"] .subtask-row`);
        rows[rows.length-1]?.querySelector('[data-role="sub-text"]')?.focus();
      },0);
    });
  });
}

/* ---------- Add task ---------- */
function addTask(fromInput){
  const val = fromInput.value.trim();
  if(!val) return;
  tasks.unshift({ id:'t'+Math.random().toString(36).slice(2,9), title:val, ticket:'', due:'', nextAction:'', status:'today', priority:'', context:'', waitingOn:'', subs:[] });
  fromInput.value = '';
  render();
}
el('attnAddInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(el('attnAddInput')); });
el('addTaskBtn').addEventListener('click', ()=> addTask(el('attnAddInput')));

/* ---------- Clean Session ---------- */
el('cleanSessionBtn').addEventListener('click', ()=>{
  const wiping = tasks.filter(t=> ['today','queue','waiting'].includes(t.status));
  if(!confirm(`Start a clean session?\n\nThis clears ${wiping.length} task${wiping.length===1?'':'s'} from Attention Now, Backlog, and Waiting On, plus Mission, Risk, and the EOD field.\n\nBlocked and Completed are left alone. This can't be undone.`)) return;
  tasks = tasks.filter(t=> !['today','queue','waiting'].includes(t.status));
  el('fldMission').value = '';
  el('fldRisk').value = '';
  el('fldEod').value = '';
  if(expandedId && !tasks.find(t=>t.id===expandedId)) expandedId = null;
  render();
});

/* ---------- Backup / Restore ---------- */
function currentState(){
  return {
    tasks,
    mission: el('fldMission').value,
    risk: el('fldRisk').value,
    eod: el('fldEod').value,
    savedAt: new Date().toISOString()
  };
}
el('backupBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(currentState(), null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `execution-tower-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});
el('restoreBtn').addEventListener('click', ()=> el('restoreInput').click());
el('restoreInput').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data.tasks)) throw new Error('missing tasks array');
      if(!confirm(`Restore from this backup? It has ${data.tasks.length} task(s), saved ${data.savedAt ? new Date(data.savedAt).toLocaleString() : 'at an unknown time'}.\n\nThis replaces everything currently on screen.`)) return;
      tasks = data.tasks;
      el('fldMission').value = data.mission || '';
      el('fldRisk').value = data.risk || '';
      el('fldEod').value = data.eod || '';
      expandedId = null;
      render();
    }catch(err){
      alert('Could not read that file as a backup: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
el('captureInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(el('captureInput')); });

/* ---------- Exec strip collapse ---------- */
el('execStripHead').addEventListener('click', ()=> el('execStrip').classList.toggle('collapsed'));

/* ---------- Low-strip toggles ---------- */
document.querySelectorAll('[data-toggle]').forEach(h=>{
  h.addEventListener('click', ()=> el(h.dataset.toggle).classList.toggle('open'));
});
el('panelBacklog').classList.remove('open');
el('panelDone').classList.remove('open');

/* ---------- Sidebar nav scroll ---------- */
document.querySelectorAll('.nav-item[data-scroll]').forEach(n=>{
  n.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    n.classList.add('active');
    const target = el(n.dataset.scroll);
    target?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
  });
});

/* ---------- Clock ---------- */
function tickClock(){
  const now = new Date();
  el('clockFoot').textContent = now.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'});
}
tickClock(); setInterval(tickClock, 60000);

/* ---------- Drag and drop ---------- */
let draggedId = null;
const STATUS_FOR_LIST = {
  listAttention: 'today',
  listWaiting: 'waiting',
  listBlocked: 'onhold',
  listBacklog: 'queue',
  listDone: 'completed'
};

function clearDropIndicators(){
  document.querySelectorAll('.drop-before,.drop-after').forEach(r=> r.classList.remove('drop-before','drop-after'));
  document.querySelectorAll('.drag-active').forEach(r=> r.classList.remove('drag-active'));
}

function moveTask(id, targetId, before, newStatus){
  const idx = tasks.findIndex(x=>x.id===id);
  if(idx===-1) return;
  const [item] = tasks.splice(idx,1);
  item.status = newStatus;
  if(targetId){
    let ti = tasks.findIndex(x=>x.id===targetId);
    tasks.splice(ti===-1 ? tasks.length : (before ? ti : ti+1), 0, item);
  } else {
    tasks.push(item);
  }
  render();
}

function wireDrag(){
  document.querySelectorAll('[data-role="drag-handle"]').forEach(handle=>{
    if(handle._wired) return;
    handle._wired = true;
    handle.setAttribute('draggable','true');
    handle.addEventListener('dragstart', e=>{
      const row = handle.closest('[data-id]');
      if(!row) return;
      draggedId = row.dataset.id;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedId);
      try{ e.dataTransfer.setDragImage(row, 24, 18); }catch(_){}
      requestAnimationFrame(()=> row.classList.add('dragging'));
    });
    handle.addEventListener('dragend', ()=>{
      const row = handle.closest('[data-id]');
      row?.classList.remove('dragging');
      clearDropIndicators();
      draggedId = null;
    });
  });

  document.querySelectorAll('[data-id]').forEach(row=>{
    if(row._dropWired) return;
    row._dropWired = true;
    row.addEventListener('dragover', e=>{
      if(!draggedId || draggedId===row.dataset.id) return;
      e.preventDefault();
      e.stopPropagation();
      const rect = row.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height/2;
      document.querySelectorAll('.drop-before,.drop-after').forEach(r=>{ if(r!==row) r.classList.remove('drop-before','drop-after'); });
      row.classList.toggle('drop-before', before);
      row.classList.toggle('drop-after', !before);
    });
    row.addEventListener('drop', e=>{
      if(!draggedId || draggedId===row.dataset.id) return;
      e.preventDefault();
      e.stopPropagation();
      const before = row.classList.contains('drop-before');
      const list = row.closest('#listAttention,#listWaiting,#listBlocked,#listBacklog,#listDone');
      const status = STATUS_FOR_LIST[list?.id] ?? tasks.find(t=>t.id===row.dataset.id)?.status;
      moveTask(draggedId, row.dataset.id, before, status);
      clearDropIndicators();
    });
  });

  Object.keys(STATUS_FOR_LIST).forEach(listId=>{
    const container = el(listId);
    if(!container || container._dropWired) return;
    container._dropWired = true;
    container.addEventListener('dragover', e=>{
      if(!draggedId) return;
      e.preventDefault();
      container.classList.add('drag-active');
    });
    container.addEventListener('dragleave', e=>{
      if(!container.contains(e.relatedTarget)) container.classList.remove('drag-active');
    });
    container.addEventListener('drop', e=>{
      if(!draggedId) return;
      e.preventDefault();
      moveTask(draggedId, null, false, STATUS_FOR_LIST[listId]);
      container.classList.remove('drag-active');
    });
  });
}

/* ---------- Init ---------- */
render();
</script>
