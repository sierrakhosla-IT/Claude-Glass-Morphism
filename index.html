<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execution Tower</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;480;500;520;540;560;580;600;650;700&family=Space+Grotesk:wght@500;600;650;700&display=swap');

:root{
  --canvas:#F7F3EE;
  --canvas-2:#FBF9F5;
  --ink:#262421;
  --ink-soft:#6E6965;
  --ink-faint:#AAA29C;
  --white:#FFFFFF;

  --accent:#B28767;        /* clay — brand primary */
  --accent-soft:#C9AA82;   /* champagne — secondary */
  --accent-pressed:#8F6B4E;

  --success:#68836F;
  --success-tint:#E9EFE7;
  --warning:#B88646;
  --warning-tint:#F7EEDF;
  --danger:#AA625D;
  --danger-tint:#F5E8E6;

  --glass-fill:rgba(255,255,255,0.58);
  --glass-fill-strong:rgba(255,255,255,0.80);
  --glass-border:rgba(255,255,255,0.45);
  --glass-blur:32px;

  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:30px; --r-pill:999px;

  --shadow-1:0 3px 12px rgba(67,57,48,0.045);
  --shadow-2:0 14px 40px rgba(150,115,85,0.10);

  --font-body:'Manrope', system-ui, sans-serif;
  --font-display:'Space Grotesk', 'Manrope', system-ui, sans-serif;

  --ease:cubic-bezier(.16,.84,.30,1);
  --dur:220ms;
}

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:var(--font-body);
  color:var(--ink);
  overflow:hidden;
  background:
    radial-gradient(circle at 10% 8%, rgba(222,203,181,0.45), transparent 36%),
    radial-gradient(circle at 90% 14%, rgba(240,225,208,0.55), transparent 32%),
    radial-gradient(circle at 75% 94%, rgba(201,170,137,0.22), transparent 38%),
    linear-gradient(150deg, var(--canvas-2), var(--canvas));
}
button{ font-family:inherit; cursor:pointer; }
input, textarea{ font-family:inherit; }

::-webkit-scrollbar{ width:7px; height:7px; }
::-webkit-scrollbar-thumb{ background:rgba(178,135,103,0.25); border-radius:99px; }
::-webkit-scrollbar-track{ background:transparent; }

/* ---------------- Glass primitive ---------------- */
.glass{
  background:linear-gradient(150deg, rgba(255,255,255,0.30), rgba(255,255,255,0.06)), var(--glass-fill);
  border:1px solid var(--glass-border);
  border-radius:var(--r-xl);
  backdrop-filter:blur(var(--glass-blur)) saturate(125%);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(125%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.75), inset 0 -1px 0 rgba(67,57,48,0.03), var(--shadow-1);
}

/* ---------------- App shell ---------------- */
.app{
  display:grid;
  grid-template-columns:210px 1fr;
  height:100vh;
  padding:14px;
  gap:14px;
}

/* ---------------- Sidebar ---------------- */
.sidebar{
  display:flex; flex-direction:column; gap:18px;
  padding:20px 14px;
  background:linear-gradient(165deg, rgba(58,49,42,0.72), rgba(36,30,26,0.80));
  border:1px solid rgba(255,255,255,0.10);
  border-radius:var(--r-xl);
  backdrop-filter:blur(30px);
  box-shadow:0 30px 68px rgba(60,45,30,0.16);
  color:rgba(255,255,255,0.92);
}
.brand{ display:flex; align-items:center; gap:9px; padding:0 4px; }
.brand-mark{ width:26px; height:26px; border-radius:8px; background:linear-gradient(150deg, var(--accent-soft), var(--accent)); flex-shrink:0; }
.brand-text{ font-family:var(--font-display); font-size:13px; font-weight:650; letter-spacing:0.06em; line-height:1.15; }
.brand-text small{ display:block; font-size:9px; font-weight:520; opacity:0.6; letter-spacing:0.14em; }

.nav{ display:flex; flex-direction:column; gap:3px; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px; border-radius:12px;
  font-size:12.5px; font-weight:560; color:rgba(255,255,255,0.68);
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.nav-item svg{ width:15px; height:15px; stroke-width:1.75; flex-shrink:0; }
.nav-item span.label{ flex:1; }
.nav-item .count{
  font-size:10.5px; font-weight:650; min-width:19px; height:19px;
  display:flex; align-items:center; justify-content:center;
  border-radius:99px; background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.85);
}
.nav-item:hover{ background:rgba(255,255,255,0.06); color:#fff; }
.nav-item.active{ background:rgba(255,255,255,0.13); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,0.14); }
.nav-item.urgent .count{ background:var(--danger); color:#fff; }

.nav-divider{ height:1px; background:rgba(255,255,255,0.08); margin:2px 4px; }
.sidebar-foot{ margin-top:auto; font-size:10px; color:rgba(255,255,255,0.42); padding:0 4px; }

/* ---------------- Main column ---------------- */
.main{ display:flex; flex-direction:column; gap:12px; min-height:0; min-width:0; }

/* Command bar */
.cmdbar{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px 9px 16px;
  border-radius:var(--r-pill) !important;
}
.cmdbar input{
  flex:1; border:none; outline:none; background:transparent;
  font-size:13px; color:var(--ink); font-weight:500;
}
.cmdbar input::placeholder{ color:var(--ink-faint); }
.cmdbar .icon-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center;
  color:var(--ink-soft); transition:background var(--dur) var(--ease);
}
.cmdbar .icon-btn:hover{ background:rgba(255,255,255,0.85); }
.cmdbar .icon-btn svg{ width:16px; height:16px; stroke-width:1.75; }

.pill-btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px; border-radius:var(--r-pill); border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.5); color:var(--ink-soft); font-size:12.5px; font-weight:600;
  transition:transform var(--dur) var(--ease), background var(--dur) var(--ease);
}
.pill-btn:hover{ transform:translateY(-1px); background:rgba(255,255,255,0.85); }
.pill-btn.primary{
  background:linear-gradient(160deg, var(--accent-soft), var(--accent));
  color:#fff; border:none; box-shadow:0 8px 20px rgba(150,115,85,0.28);
}
.pill-btn svg{ width:14px; height:14px; stroke-width:2; }

/* Health pills */
.health-row{ display:flex; align-items:center; gap:7px; }
.health-pill{
  display:flex; align-items:center; gap:6px;
  padding:5px 11px 5px 8px; border-radius:var(--r-pill);
  font-size:11px; font-weight:650; color:var(--ink-soft);
  background:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.5);
}
.health-pill .dot{ width:6px; height:6px; border-radius:50%; }
.health-pill.attn .dot{ background:var(--accent); }
.health-pill.wait .dot{ background:#8C93A6; }
.health-pill.block .dot{ background:var(--warning); }
.health-pill.over .dot{ background:var(--danger); }
.health-pill.over{ color:var(--danger); background:var(--danger-tint); border-color:transparent; }

/* Executive Tower strip */
.exec-strip{
  padding:14px 20px;
  transition:padding var(--dur) var(--ease), max-height var(--dur) var(--ease);
}
.exec-strip-head{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.exec-strip-head svg.chev{ width:13px; height:13px; stroke-width:2; color:var(--ink-faint); transition:transform var(--dur) var(--ease); margin-left:auto; }
.exec-strip.collapsed .chev{ transform:rotate(-90deg); }
.exec-title{ font-family:var(--font-display); font-size:12px; font-weight:650; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent-pressed); }
.exec-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:18px;
  margin-top:12px;
  max-height:120px; overflow:hidden; opacity:1;
  transition:max-height var(--dur) var(--ease), opacity var(--dur) var(--ease), margin var(--dur) var(--ease);
}
.exec-strip.collapsed .exec-grid{ max-height:0; opacity:0; margin-top:0; }
.exec-field{ min-width:0; }
.exec-field label{ display:block; font-size:9.5px; font-weight:650; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:5px; }
.exec-editable{
  font-size:12.5px; font-weight:540; color:var(--ink); line-height:1.4;
  min-height:18px; outline:none; border-radius:8px; padding:3px 5px; margin:-3px -5px;
}
.exec-editable:empty::before{ content:attr(data-placeholder); color:var(--ink-faint); font-weight:480; }
.exec-editable:hover{ background:rgba(255,255,255,0.4); }
.exec-editable:focus{ background:rgba(255,255,255,0.7); box-shadow:0 0 0 2px rgba(178,135,103,0.25); }
.leader-row{ display:flex; align-items:baseline; gap:6px; font-size:12.5px; }
.leader-row + .leader-row{ margin-top:4px; }
.leader-name{ font-weight:650; color:var(--ink-soft); flex-shrink:0; }

/* Triage grid */
.triage{
  display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px;
  flex:1; min-height:0;
}
.panel{ display:flex; flex-direction:column; min-height:0; padding:0; }
.panel-head{
  display:flex; align-items:center; gap:9px;
  padding:16px 18px 12px;
  flex-shrink:0;
}
.panel-head svg.pi{ width:16px; height:16px; stroke-width:1.8; }
.panel-title{ font-family:var(--font-display); font-size:14.5px; font-weight:650; color:var(--ink); }
.panel-sub{ font-size:10.5px; color:var(--ink-faint); font-weight:520; margin-top:1px; }
.panel-count{
  min-width:22px; height:22px; padding:0 6px; border-radius:99px;
  display:flex; align-items:center; justify-content:center;
  font-size:10.5px; font-weight:700; color:var(--ink-soft); background:rgba(255,255,255,0.5);
}
.panel-body{ flex:1; overflow-y:auto; padding:2px 12px 14px; }
.panel-empty{ font-size:11.5px; color:var(--ink-faint); padding:20px 8px; text-align:center; }

/* Attention panel: hero */
.attn-add{
  display:flex; align-items:center; gap:8px; margin:0 6px 10px;
  padding:9px 12px; border-radius:var(--r-md);
  background:rgba(255,255,255,0.4); border:1px dashed rgba(178,135,103,0.35);
}
.attn-add svg{ width:14px; height:14px; color:var(--accent); stroke-width:2.25; flex-shrink:0; }
.attn-add input{ flex:1; border:none; background:transparent; outline:none; font-size:12.5px; color:var(--ink); font-weight:500; }
.attn-add input::placeholder{ color:var(--ink-faint); }

/* Task row (Attention Now) */
.task{ border-bottom:1px solid rgba(20,20,30,0.06); }
.task:last-child{ border-bottom:none; }
.task-row{ display:flex; align-items:flex-start; gap:10px; padding:10px 6px; border-radius:var(--r-md); transition:background var(--dur) var(--ease); cursor:pointer; }
.task-row:hover{ background:rgba(255,255,255,0.5); }
.check{
  width:17px; height:17px; border-radius:50%; margin-top:1px; flex-shrink:0;
  border:1.5px solid var(--ink-faint); background:rgba(255,255,255,0.5);
  transition:background var(--dur), border-color var(--dur);
}
.check:hover{ border-color:var(--accent); }
.check.done{ background:var(--success); border-color:var(--success); }
.task-main{ flex:1; min-width:0; }
.task-title-row{ display:flex; align-items:center; gap:7px; }
.task-title{ font-size:12.5px; font-weight:560; color:var(--ink); outline:none; border-radius:5px; padding:1px 3px; margin:-1px -3px; }
.task-title:focus{ background:rgba(255,255,255,0.7); }
.task-next{ font-size:11px; color:var(--ink-soft); margin-top:2px; outline:none; border-radius:5px; padding:1px 3px; margin-left:-3px; }
.task-next:empty::before{ content:'+ next action'; color:var(--ink-faint); }
.task-next:focus{ background:rgba(255,255,255,0.6); }
.task-meta{ display:flex; align-items:center; gap:6px; margin-top:6px; flex-wrap:wrap; }
.chip{
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:600; letter-spacing:0.01em;
  padding:3px 9px; border-radius:99px; background:rgba(255,255,255,0.5); color:var(--ink-soft);
  outline:none;
}
.chip:empty::before{ color:var(--ink-faint); font-weight:520; }
.chip.due{ background:var(--warning-tint); color:var(--warning); }
.chip.due.overdue{ background:var(--danger); color:#fff; }
.chip.ticket{ background:rgba(178,135,103,0.16); color:var(--accent-pressed); }
.chip.priority-high{ background:var(--danger-tint); color:var(--danger); }
.chip.priority-med{ background:var(--warning-tint); color:var(--warning); }
.chip.priority-low{ background:rgba(255,255,255,0.5); color:var(--ink-faint); }
.chip-add{ font-size:10px; color:var(--ink-faint); font-weight:600; cursor:pointer; padding:3px 7px; }
.chip-add:hover{ color:var(--accent); }
.expand-toggle{ margin-left:auto; color:var(--ink-faint); flex-shrink:0; }
.expand-toggle svg{ width:13px; height:13px; stroke-width:2; transition:transform var(--dur) var(--ease); }
.task.expanded .expand-toggle svg{ transform:rotate(180deg); }

.task-detail{ max-height:0; overflow:hidden; transition:max-height var(--dur) var(--ease); padding:0 6px; }
.task.expanded .task-detail{ max-height:260px; }
.detail-inner{ padding:4px 34px 12px 33px; display:flex; flex-direction:column; gap:9px; }
.detail-field{ display:flex; flex-direction:column; gap:3px; }
.detail-field label{ font-size:9.5px; font-weight:650; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-faint); }
.detail-field .val{ font-size:12px; color:var(--ink); outline:none; border-radius:6px; padding:4px 6px; margin:-4px -6px; background:rgba(255,255,255,0.35); }
.detail-field .val:empty::before{ content:attr(data-placeholder); color:var(--ink-faint); }
.detail-field .val:focus{ background:rgba(255,255,255,0.7); }
.detail-row2{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.status-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:2px; }
.status-btn{
  font-size:10px; font-weight:650; padding:5px 11px; border-radius:99px;
  background:rgba(255,255,255,0.5); color:var(--ink-soft); border:1px solid transparent;
}
.status-btn.current{ background:var(--accent); color:#fff; }
.subtask-list{ display:flex; flex-direction:column; gap:5px; }
.subtask-row{ display:flex; align-items:center; gap:7px; font-size:11.5px; }
.subtask-row .check{ width:13px; height:13px; }
.subtask-row .val{ flex:1; }
.subtask-row .done + .val{ color:var(--ink-faint); text-decoration:line-through; }
.subtask-add{ font-size:10.5px; color:var(--ink-faint); font-weight:600; cursor:pointer; }
.subtask-add:hover{ color:var(--accent); }

/* Waiting-on grouping */
.wait-group{ margin-bottom:6px; }
.wait-group-head{ display:flex; align-items:center; gap:7px; padding:9px 6px 5px; }
.wait-avatar{
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(150deg, var(--accent-soft), var(--accent));
  color:#fff; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center;
}
.wait-name{ font-size:12px; font-weight:650; color:var(--ink); }
.wait-count{ font-size:10px; color:var(--ink-faint); font-weight:600; margin-left:auto; }
.wait-item{ padding:7px 6px 9px 33px; border-bottom:1px solid rgba(20,20,30,0.05); }
.wait-item:last-child{ border-bottom:none; }
.wait-item .task-title{ display:block; font-size:12px; font-weight:550; }
.wait-item .task-meta{ margin-top:5px; }

/* Blocked panel */
.block-item{ padding:9px 6px; border-bottom:1px solid rgba(20,20,30,0.05); }
.block-item:last-child{ border-bottom:none; }
.block-item .task-title{ display:block; font-size:12px; font-weight:550; }
.block-item .task-meta{ margin-top:5px; }

/* Bottom low-weight strip */
.low-strip{ display:flex; gap:12px; flex-shrink:0; }
.low-panel{ flex:1; padding:0; overflow:hidden; }
.low-head{
  display:flex; align-items:center; gap:8px; padding:11px 16px; cursor:pointer; user-select:none;
}
.low-head svg.li{ width:14px; height:14px; stroke-width:1.75; color:var(--ink-faint); }
.low-title{ font-size:12px; font-weight:650; color:var(--ink-soft); }
.low-count{ font-size:10.5px; font-weight:650; color:var(--ink-faint); }
.low-head svg.chev{ width:12px; height:12px; stroke-width:2; color:var(--ink-faint); margin-left:auto; transition:transform var(--dur) var(--ease); }
.low-panel.open .chev{ transform:rotate(180deg); }
.low-body{ max-height:0; overflow:hidden; transition:max-height var(--dur) var(--ease); }
.low-panel.open .low-body{ max-height:180px; overflow-y:auto; }
.low-body-inner{ padding:0 14px 12px; }
.low-item{ display:flex; align-items:center; gap:8px; padding:6px 4px; font-size:11.5px; color:var(--ink-soft); border-bottom:1px solid rgba(20,20,30,0.04); }
.low-item:last-child{ border-bottom:none; }
.low-item.completed{ color:var(--ink-faint); }
.low-item.completed .check{ width:12px; height:12px; background:var(--success); border-color:var(--success); }
.low-item .task-title{ font-size:11.5px; flex:1; }

@media (max-width:1180px){
  .triage{ grid-template-columns:1.3fr 1fr; }
  .triage .panel:nth-child(3){ grid-column:1 / -1; }
}
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">EXECUTION<small>TOWER</small></div>
    </div>

    <nav class="nav" id="mainNav">
      <div class="nav-item active" data-scroll="panelAttention"><svg data-i="zap"></svg><span class="label">Attention Now</span><span class="count" id="navAttnCount">0</span></div>
      <div class="nav-item" data-scroll="panelWaiting"><svg data-i="users"></svg><span class="label">Waiting On</span><span class="count" id="navWaitCount">0</span></div>
      <div class="nav-item" data-scroll="panelBlocked"><svg data-i="octagon-pause"></svg><span class="label">Blocked</span><span class="count" id="navBlockCount">0</span></div>
      <div class="nav-divider"></div>
      <div class="nav-item" data-scroll="panelBacklog"><svg data-i="layers"></svg><span class="label">Backlog</span><span class="count" id="navBacklogCount">0</span></div>
      <div class="nav-item" data-scroll="panelDone"><svg data-i="check-check"></svg><span class="label">Completed</span><span class="count" id="navDoneCount">0</span></div>
    </nav>

    <div class="sidebar-foot" id="clockFoot">—</div>
  </aside>

  <main class="main">

    <div class="cmdbar glass">
      <svg data-i="plus" style="width:15px;height:15px;color:var(--ink-faint);flex-shrink:0;"></svg>
      <input id="captureInput" type="text" placeholder="Capture a task, update, decision, or note…">
      <div class="health-row" id="healthRow"></div>
      <button class="icon-btn" title="Ask AI"><svg data-i="sparkles"></svg></button>
      <button class="pill-btn primary" id="addTaskBtn"><svg data-i="plus"></svg>Add task</button>
    </div>

    <div class="exec-strip glass" id="execStrip">
      <div class="exec-strip-head" id="execStripHead">
        <svg data-i="compass" style="width:13px;height:13px;color:var(--accent-pressed);"></svg>
        <span class="exec-title">Execution Tower</span>
        <svg data-i="chevron-down" class="chev"></svg>
      </div>
      <div class="exec-grid">
        <div class="exec-field">
          <label>Mission</label>
          <div class="exec-editable" contenteditable data-placeholder="What today needs to accomplish" id="fldMission"></div>
        </div>
        <div class="exec-field">
          <label>Top Risk</label>
          <div class="exec-editable" contenteditable data-placeholder="What could derail it" id="fldRisk"></div>
        </div>
        <div class="exec-field">
          <label>Leadership Needs</label>
          <div id="leaderList"></div>
        </div>
        <div class="exec-field">
          <label>Must Be True by EOD</label>
          <div class="exec-editable" contenteditable data-placeholder="The one non-negotiable" id="fldEod"></div>
        </div>
      </div>
    </div>

    <div class="triage">

      <section class="panel glass" id="panelAttention">
        <div class="panel-head">
          <svg data-i="zap" class="pi" style="color:var(--accent);"></svg>
          <div><div class="panel-title">Attention Now</div><div class="panel-sub">Today, overdue, and due soon</div></div>
          <div class="panel-count" id="cntAttention">0</div>
        </div>
        <div class="panel-body">
          <div class="attn-add">
            <svg data-i="corner-down-right"></svg>
            <input id="attnAddInput" placeholder="Add to Attention Now…">
          </div>
          <div id="listAttention"></div>
        </div>
      </section>

      <section class="panel glass" id="panelWaiting">
        <div class="panel-head">
          <svg data-i="users" class="pi" style="color:#8C93A6;"></svg>
          <div><div class="panel-title">Waiting On</div><div class="panel-sub">Blocked by someone else</div></div>
          <div class="panel-count" id="cntWaiting">0</div>
        </div>
        <div class="panel-body" id="listWaiting"></div>
      </section>

      <section class="panel glass" id="panelBlocked">
        <div class="panel-head">
          <svg data-i="octagon-pause" class="pi" style="color:var(--warning);"></svg>
          <div><div class="panel-title">Blocked</div><div class="panel-sub">On hold, internal constraint</div></div>
          <div class="panel-count" id="cntBlocked">0</div>
        </div>
        <div class="panel-body" id="listBlocked"></div>
      </section>

    </div>

    <div class="low-strip">
      <div class="low-panel glass" id="panelBacklog">
        <div class="low-head" data-toggle="panelBacklog">
          <svg data-i="layers" class="li"></svg>
          <span class="low-title">Backlog</span>
          <span class="low-count" id="cntBacklog">0</span>
          <svg data-i="chevron-down" class="chev"></svg>
        </div>
        <div class="low-body"><div class="low-body-inner" id="listBacklog"></div></div>
      </div>
      <div class="low-panel glass" id="panelDone">
        <div class="low-head" data-toggle="panelDone">
          <svg data-i="check-check" class="li"></svg>
          <span class="low-title">Completed</span>
          <span class="low-count" id="cntDone">0</span>
          <svg data-i="chevron-down" class="chev"></svg>
        </div>
        <div class="low-body"><div class="low-body-inner" id="listDone"></div></div>
      </div>
    </div>

  </main>
</div>

<script>
/* ============================================================
   INLINE ICON SET — self-contained replacement for the lucide
   CDN script. Same API (lucide.createIcons()), zero network
   dependency, so this never breaks in a sandboxed preview,
   offline, or behind a corporate proxy.
   ============================================================ */
const ICONS = {
  'plus': '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
  'chevron-down': '<polyline points="6 9 12 15 18 9"></polyline>',
  'chevron-left': '<polyline points="15 18 9 12 15 6"></polyline>',
  'check-check': '<path d="M18 6 7 17l-5-5"></path><path d="m22 10-7.5 7.5L13 16"></path>',
  'sparkles': '<path d="M12 3v4M12 17v4M5 12H1M23 12h-4M6.34 6.34 3.5 3.5M20.5 20.5l-2.84-2.84M6.34 17.66 3.5 20.5M20.5 3.5l-2.84 2.84"></path><circle cx="12" cy="12" r="3"></circle>',
  'x': '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
  'zap': '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
  'users': '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>',
  'octagon-pause': '<path d="M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86Z"></path><line x1="10" y1="15" x2="10" y2="9"></line><line x1="14" y1="15" x2="14" y2="9"></line>',
  'layers': '<path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"></path><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"></path><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"></path>',
  'compass': '<circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>',
  'corner-down-right': '<polyline points="15 10 20 15 15 20"></polyline><path d="M4 4v7a4 4 0 0 0 4 4h12"></path>',
  'search': '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>'
};

const lucide = {
  createIcons(){
    document.querySelectorAll('[data-lucide]').forEach(el=>{
      const name = el.getAttribute('data-lucide');
      const inner = ICONS[name];
      if(!inner) return;
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 24 24');
      svg.setAttribute('width','20');
      svg.setAttribute('height','20');
      svg.setAttribute('fill','none');
      svg.setAttribute('stroke','currentColor');
      svg.setAttribute('stroke-width','1.5');
      svg.setAttribute('stroke-linecap','round');
      svg.setAttribute('stroke-linejoin','round');
      for(const attr of el.attributes){
        if(attr.name === 'data-lucide') continue;
        svg.setAttribute(attr.name, attr.value);
      }
      svg.innerHTML = inner;
      el.replaceWith(svg);
    });
  }
};
</script>
<script>
/* ---------- Icon rendering (svg data-i -> lucide) ---------- */
function paintIcons(){
  document.querySelectorAll('svg[data-i]').forEach(el=>{
    const name = el.getAttribute('data-i');
    el.removeAttribute('data-i');
    el.setAttribute('data-lucide', name);
  });
  lucide.createIcons();
}

/* ---------- Data model ----------
   Single Task Queue. status: 'today' | 'queue' | 'waiting' | 'onhold' | 'completed'
   Ported from the real backup — nothing fabricated. */
let tasks = [
  { id:'z706q2z', title:'Validate Carrier and Device Inventory Exceptions', ticket:'', due:'', nextAction:'', status:'today', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'bhv4zv0', title:'Add User email to the inventory intake process form', ticket:'', due:'', nextAction:'', status:'queue', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'rspopck', title:'Gather thoughts and questions about new plan', ticket:'', due:'7/21/2026', nextAction:'', status:'waiting', priority:'',
    waitingOn:'Tavia — her ideas and the migration',
    context:'Instead of thinking about a line migration & device refresh, treat them as two separate projects.',
    subs:[
      {id:'nw4ixem', t:'Brainstorm the plan for only line migration', done:false},
      {id:'wxut790', t:'Brainstorm the plan for only device refresh', done:false},
      {id:'3pksoeg', t:'Document complications', done:false},
      {id:'38lyfl6', t:'Document questions', done:false},
    ]},
  { id:'lvf9jxz', title:"Disconnect Brooke William's line", status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'0k9o3x6', title:'Disconnect Terry Oswalds line', status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'010z75q', title:"Inventory Pierre Brunelle's laptop", status:'completed', due:'', ticket:'', nextAction:'', priority:'', context:'', waitingOn:'', subs:[] },
  { id:'j2uqafu', title:'Cleanup Intune Report', status:'completed', due:'', ticket:'', nextAction:'Pull updated report', priority:'', context:'', waitingOn:'', subs:[] },
];

let expandedId = null;

const el = id => document.getElementById(id);

function isOverdue(due){
  if(!due) return false;
  const d = new Date(due);
  if(isNaN(d)) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function priorityChip(p){
  if(!p) return '';
  const cls = p==='high'?'priority-high':p==='med'?'priority-med':'priority-low';
  return `<span class="chip ${cls}">${p==='high'?'High':p==='med'?'Medium':'Low'}</span>`;
}

/* ---------- Rendering ---------- */
function render(){
  const attention = tasks.filter(t=>t.status==='today' || (t.status==='queue' && t.due));
  const waiting = tasks.filter(t=>t.status==='waiting');
  const blocked = tasks.filter(t=>t.status==='onhold');
  const backlog = tasks.filter(t=>t.status==='queue' && !t.due);
  const done = tasks.filter(t=>t.status==='completed');

  el('cntAttention').textContent = attention.length;
  el('cntWaiting').textContent = waiting.length;
  el('cntBlocked').textContent = blocked.length;
  el('cntBacklog').textContent = backlog.length;
  el('cntDone').textContent = done.length;
  el('navAttnCount').textContent = attention.length;
  el('navWaitCount').textContent = waiting.length;
  el('navBlockCount').textContent = blocked.length;
  el('navBacklogCount').textContent = backlog.length;
  el('navDoneCount').textContent = done.length;

  const overdueCount = tasks.filter(t=>isOverdue(t.due) && t.status!=='completed').length;
  el('healthRow').innerHTML = `
    <div class="health-pill attn"><span class="dot"></span>${attention.length} Attention</div>
    <div class="health-pill wait"><span class="dot"></span>${waiting.length} Waiting</div>
    <div class="health-pill block"><span class="dot"></span>${blocked.length} Blocked</div>
    ${overdueCount ? `<div class="health-pill over"><span class="dot"></span>${overdueCount} Overdue</div>` : ''}
  `;

  el('listAttention').innerHTML = attention.length
    ? attention.map(t=>taskRowHTML(t)).join('')
    : `<div class="panel-empty">Nothing needs attention right now.</div>`;

  // Waiting — grouped by person
  const groups = {};
  waiting.forEach(t=>{
    const who = (t.waitingOn||'Unspecified').split('—')[0].split('-')[0].trim() || 'Unspecified';
    (groups[who] = groups[who]||[]).push(t);
  });
  el('listWaiting').innerHTML = waiting.length
    ? Object.entries(groups).map(([name, items])=>`
        <div class="wait-group">
          <div class="wait-group-head">
            <div class="wait-avatar">${name.slice(0,2).toUpperCase()}</div>
            <div class="wait-name">${name}</div>
            <div class="wait-count">${items.length}</div>
          </div>
          ${items.map(t=>`
            <div class="wait-item" data-id="${t.id}">
              <span class="task-title">${t.title}</span>
              <div class="task-meta">
                ${t.due ? `<span class="chip due ${isOverdue(t.due)?'overdue':''}">${t.due}</span>` : ''}
                <span class="chip" style="background:rgba(255,255,255,0.55);">${(t.waitingOn||'').split('—')[1] ? t.waitingOn.split('—')[1].trim() : (t.waitingOn||'')}</span>
              </div>
            </div>`).join('')}
        </div>`).join('')
    : `<div class="panel-empty">Nothing waiting on anyone.</div>`;

  el('listBlocked').innerHTML = blocked.length
    ? blocked.map(t=>`
        <div class="block-item" data-id="${t.id}">
          <span class="task-title">${t.title}</span>
          <div class="task-meta">${t.due?`<span class="chip due ${isOverdue(t.due)?'overdue':''}">${t.due}</span>`:''}</div>
        </div>`).join('')
    : `<div class="panel-empty">Nothing blocked.</div>`;

  el('listBacklog').innerHTML = backlog.length
    ? backlog.map(t=>`<div class="low-item" data-id="${t.id}"><span class="task-title">${t.title}</span></div>`).join('')
    : `<div class="panel-empty">Backlog is empty.</div>`;

  el('listDone').innerHTML = done.length
    ? done.map(t=>`<div class="low-item completed" data-id="${t.id}"><div class="check done"></div><span class="task-title">${t.title}</span></div>`).join('')
    : `<div class="panel-empty">Nothing completed yet.</div>`;

  paintIcons();
  wireRowEvents();
}

function taskRowHTML(t){
  const expanded = expandedId === t.id;
  return `
  <div class="task ${expanded?'expanded':''}" data-id="${t.id}">
    <div class="task-row" data-role="row">
      <div class="check ${t.status==='completed'?'done':''}" data-role="check"></div>
      <div class="task-main">
        <div class="task-title-row">
          <div class="task-title" contenteditable data-role="title">${t.title}</div>
        </div>
        <div class="task-next" contenteditable data-role="next">${t.nextAction||''}</div>
        <div class="task-meta">
          ${t.ticket?`<span class="chip ticket">${t.ticket}</span>`:''}
          ${t.due?`<span class="chip due ${isOverdue(t.due)?'overdue':''}">${t.due}</span>`:''}
          ${priorityChip(t.priority)}
          <span class="chip-add" data-role="add-priority">+ priority</span>
        </div>
      </div>
      <div class="expand-toggle" data-role="toggle"><svg data-i="chevron-down"></svg></div>
    </div>
    <div class="task-detail">
      <div class="detail-inner">
        <div class="detail-row2">
          <div class="detail-field"><label>Ticket</label><div class="val" contenteditable data-placeholder="RITM / INC" data-role="ticket">${t.ticket||''}</div></div>
          <div class="detail-field"><label>Due</label><div class="val" contenteditable data-placeholder="mm/dd/yyyy" data-role="due">${t.due||''}</div></div>
        </div>
        <div class="detail-field"><label>Context</label><div class="val" contenteditable data-placeholder="Add context or notes" data-role="context">${t.context||''}</div></div>
        <div class="subtask-list" data-role="subs">
          ${t.subs.map(s=>`
            <div class="subtask-row" data-sub="${s.id}">
              <div class="check ${s.done?'done':''}" data-role="sub-check"></div>
              <div class="val" contenteditable data-role="sub-text">${s.t}</div>
            </div>`).join('')}
          <div class="subtask-add" data-role="add-sub">+ subtask</div>
        </div>
        <div class="status-row">
          ${['today','queue','waiting','onhold','completed'].map(s=>`
            <div class="status-btn ${t.status===s?'current':''}" data-role="status" data-status="${s}">${labelFor(s)}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}
function labelFor(s){
  return {today:'Attention', queue:'Backlog', waiting:'Waiting', onhold:'Blocked', completed:'Done'}[s];
}

function wireRowEvents(){
  document.querySelectorAll('.task').forEach(taskEl=>{
    const id = taskEl.dataset.id;
    const t = tasks.find(x=>x.id===id);
    if(!t) return;

    taskEl.querySelector('[data-role="row"]').addEventListener('click', (e)=>{
      if(e.target.closest('[data-role="check"]') || e.target.isContentEditable) return;
      expandedId = expandedId === id ? null : id;
      render();
    });
    taskEl.querySelector('[data-role="check"]').addEventListener('click', (e)=>{
      e.stopPropagation();
      t.status = t.status === 'completed' ? 'today' : 'completed';
      render();
    });
    const title = taskEl.querySelector('[data-role="title"]');
    title.addEventListener('blur', ()=>{ t.title = title.textContent.trim(); render(); });
    title.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); title.blur(); } });

    const next = taskEl.querySelector('[data-role="next"]');
    next.addEventListener('blur', ()=>{ t.nextAction = next.textContent.trim(); render(); });

    taskEl.querySelector('[data-role="add-priority"]')?.addEventListener('click', e=>{
      e.stopPropagation();
      const order = ['', 'low', 'med', 'high'];
      t.priority = order[(order.indexOf(t.priority)+1) % order.length];
      render();
    });

    const ticket = taskEl.querySelector('[data-role="ticket"]');
    ticket?.addEventListener('blur', ()=>{ t.ticket = ticket.textContent.trim(); render(); });
    const due = taskEl.querySelector('[data-role="due"]');
    due?.addEventListener('blur', ()=>{ t.due = due.textContent.trim(); render(); });
    const ctx = taskEl.querySelector('[data-role="context"]');
    ctx?.addEventListener('blur', ()=>{ t.context = ctx.textContent.trim(); render(); });

    taskEl.querySelectorAll('[data-role="status"]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        t.status = btn.dataset.status;
        expandedId = null;
        render();
      });
    });

    taskEl.querySelectorAll('.subtask-row').forEach(row=>{
      const subId = row.dataset.sub;
      const sub = t.subs.find(s=>s.id===subId);
      row.querySelector('[data-role="sub-check"]').addEventListener('click', e=>{
        e.stopPropagation(); sub.done = !sub.done; render();
      });
      const txt = row.querySelector('[data-role="sub-text"]');
      txt.addEventListener('blur', ()=>{ sub.t = txt.textContent.trim(); render(); });
    });
    taskEl.querySelector('[data-role="add-sub"]')?.addEventListener('click', e=>{
      e.stopPropagation();
      t.subs.push({id:'s'+Math.random().toString(36).slice(2,8), t:'', done:false});
      render();
      setTimeout(()=>{
        const rows = document.querySelectorAll(`.task[data-id="${id}"] .subtask-row`);
        rows[rows.length-1]?.querySelector('[data-role="sub-text"]')?.focus();
      },0);
    });
  });

  // Low-strip items: click to reopen into Attention quickly
  document.querySelectorAll('.low-item[data-id], .block-item[data-id], .wait-item[data-id]').forEach(row=>{
    row.style.cursor='pointer';
    row.addEventListener('click', ()=>{
      expandedId = row.dataset.id;
      document.getElementById('panelAttention').scrollIntoView({behavior:'smooth', block:'nearest'});
      const t = tasks.find(x=>x.id===row.dataset.id);
      if(t && (t.status==='queue')) t.status='today';
      render();
    });
  });
}

/* ---------- Add task ---------- */
function addTask(fromInput){
  const val = fromInput.value.trim();
  if(!val) return;
  tasks.unshift({ id:'t'+Math.random().toString(36).slice(2,9), title:val, ticket:'', due:'', nextAction:'', status:'today', priority:'', context:'', waitingOn:'', subs:[] });
  fromInput.value = '';
  render();
}
el('attnAddInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(el('attnAddInput')); });
el('addTaskBtn').addEventListener('click', ()=> addTask(el('attnAddInput')));
el('captureInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(el('captureInput')); });

/* ---------- Exec strip collapse ---------- */
el('execStripHead').addEventListener('click', ()=> el('execStrip').classList.toggle('collapsed'));

/* ---------- Low-strip toggles ---------- */
document.querySelectorAll('[data-toggle]').forEach(h=>{
  h.addEventListener('click', ()=> el(h.dataset.toggle).classList.toggle('open'));
});
el('panelBacklog').classList.remove('open');
el('panelDone').classList.remove('open');

/* ---------- Sidebar nav scroll ---------- */
document.querySelectorAll('.nav-item[data-scroll]').forEach(n=>{
  n.addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    n.classList.add('active');
    const target = el(n.dataset.scroll);
    target?.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
  });
});

/* ---------- Clock ---------- */
function tickClock(){
  const now = new Date();
  el('clockFoot').textContent = now.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric'});
}
tickClock(); setInterval(tickClock, 60000);

/* ---------- Init ---------- */
render();
</script>
</body>
</html>
